<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta
      name="description"
      content="Find the cheapest metered street parking near you in Vancouver, BC."
    />
    <title>Vancouver Parking Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="header">
        <h1 class="header__title">Vancouver Parking</h1>
        <p class="header__subtitle">Find the cheapest spots near you</p>
      </header>

      <main class="main">
        <section id="search-section" class="search-section">
          <div class="rate-tabs" role="tablist" aria-label="Rate type">
            <span class="rate-tabs__indicator" aria-hidden="true"></span>
            <button
              type="button"
              role="tab"
              class="rate-tabs__btn rate-tabs__btn--active"
              data-rate="day"
              aria-selected="true"
            >
              Day Rate
            </button>
            <button
              type="button"
              role="tab"
              class="rate-tabs__btn"
              data-rate="evening"
              aria-selected="false"
            >
              Evening Rate
            </button>
          </div>

          <form id="search-form" class="search-form">
            <label class="search-form__label" for="address-input">
              Address, intersection or PayByPhone ID
            </label>
            <div class="search-form__row">
              <div class="search-form__input-wrap">
                <input
                  id="address-input"
                  class="search-form__input"
                  type="text"
                  placeholder="&quot;Howe Nelson&quot; or &quot;50391&quot;"
                  autocomplete="off"
                  role="combobox"
                  aria-autocomplete="list"
                  aria-expanded="false"
                  aria-controls="autocomplete-list"
                />
                <ul
                  id="autocomplete-list"
                  class="autocomplete hidden"
                  role="listbox"
                  aria-label="Address suggestions"
                ></ul>
              </div>
              <button type="submit" class="btn btn--primary" id="search-btn">
                Search
              </button>
            </div>
          </form>

          <div class="search-form__divider">
            <span>or</span>
          </div>

          <div class="location-btn-wrap">
            <button type="button" class="btn btn--secondary" id="location-btn">
              Use My Location
            </button>
          </div>
        </section>

        <section id="results-section" class="results-section hidden">
          <div class="results-header">
            <div class="results-header__toolbar">
              <button type="button" class="btn btn--ghost" id="back-btn">
                ← Back
              </button>
              <div class="results-header__controls">
                <select id="rate-select" class="sort-select" aria-label="Rate display">
                  <option value="day" selected>Day Rate</option>
                  <option value="evening">Evening Rate</option>
                  <option value="all">All Rates</option>
                </select>
                <select id="sort-select" class="sort-select" aria-label="Sort results">
                  <option value="closest" selected>Closest</option>
                  <option value="cheapest">Cheapest</option>
                </select>
              </div>
            </div>
            <div class="results-header__meta">
              <p id="location-label" class="results-header__location"></p>
              <p id="results-count" class="results-header__count"></p>
            </div>
          </div>

          <div id="loading" class="loading hidden">
            <div class="loading__spinner" aria-hidden="true"></div>
            <p class="loading__text">Finding parking spots…</p>
            <button
              type="button"
              class="btn btn--secondary loading__cancel hidden"
              id="location-cancel-btn"
            >
              Cancel
            </button>
          </div>

          <div id="error" class="error hidden" role="alert"></div>

          <div id="results-table-wrap" class="results-table-wrap hidden">
            <table class="results-table" id="results-table">
              <colgroup>
                <col class="results-table__col-pay" />
                <col class="results-table__col-rate" />
                <col class="results-table__col-dist" />
              </colgroup>
              <thead>
                <tr>
                  <th scope="col">PayByPhone</th>
                  <th scope="col" id="rate-header">Day Rate</th>
                  <th scope="col">Distance</th>
                </tr>
              </thead>
              <tbody id="results-body"></tbody>
            </table>
          </div>
        </section>
      </main>

      <footer class="footer">
        <p>
          Data:
          <a
            href="https://opendata.vancouver.ca/explore/dataset/parking-meters/"
            target="_blank"
            rel="noopener noreferrer"
            >City of Vancouver Open Data</a
          >
          · CC-BY 4.0
        </p>
        <p class="footer__note">Unofficial — not affiliated with the City of Vancouver.</p>
      </footer>
    </div>
    <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
